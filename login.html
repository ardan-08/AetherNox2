<!DOCTYPE html>
<html lang="id">

<head>
  <title>Form Registrasi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #112237 0%, #0d131a 60%, #08101b 100%);
  margin: 0;
  padding: 20px;
  color: #f5f9ff;
}

.container {
  width: 100%;
  max-width: 420px;
  margin: auto;
  background: rgba(9, 18, 34, 0.92);
  padding: 24px;
  border-radius: 16px;
  border: 1px solid rgba(78, 143, 255, 0.18);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.29);
  backdrop-filter: blur(14px);
}

.logo-wrapper {
  text-align: center;
  margin-bottom: 18px;
}

.logo-wrapper img {
  max-width: 100%;
  height: auto;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  box-shadow: 0 14px 35px rgba(0, 0, 0, 0.22);
  background: rgba(255, 255, 255, 0.06);
  padding: 8px;
}

.clock {
  text-align: center;
  font-size: 1.3rem;
  color: #f9fbff;
  margin-bottom: 5px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.date {
  text-align: center;
  font-size: 0.95rem;
  color: #d7e3ff;
  margin-bottom: 18px;
}

h1 {
  text-align: center;
  background: rgba(3, 4, 66, 0.781);
  color: white;
  padding: 10px;
  border-radius: 5px;
}

label {
  display: block;
  margin-top: 10px;
}

input,
select,
textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  background: #f5f9ff;
  color: #000;
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: #4e8fff;
  box-shadow: 0 0 10px rgba(78, 143, 255, 0.4);
}

.radio-group {
  margin-top: 5px;
}

.radio-group input {
  width: auto;
}

button {
  width: 48%;
  padding: 10px;
  margin-top: 15px;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

button:hover {
  transform: scale(1.03);
}

.submit {
  background: linear-gradient(45deg, #00c853, #64dd17);
  box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
}

.submit:hover {
  box-shadow: 0 0 25px rgba(0, 255, 0, 0.5);
}

.reset {
  background: linear-gradient(45deg, #d50000, #ff1744);
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
}

.reset:hover {
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
}

.btn-group {
  display: flex;
  justify-content: space-between;
}

#displayImage {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  display: block;
  margin: 20px auto;
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

input[type="checkbox"] {
  width: auto;
  margin-right: 8px;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, lime, cyan);
  transition: 0.3s;
}

#strengthText {
  margin-top: 8px;
  font-weight: bold;
  text-align: center;
}

@media (max-width: 500px) {
  .container {
    padding: 18px;
  }

  button {
    width: 100%;
    margin-top: 10px;
  }

  .btn-group {
    flex-direction: column;
  }

  #displayImage {
    width: 160px;
    height: 160px;
  }
}
  </style>
</head>

<body>
  <div class="logo-wrapper">
    <img src="logo.png" alt="Logo">
  </div>
  <div class="container">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date">-- -- ----</div>
    <form id="form">
      <input type="hidden" name="access_key" value="ba6e51ec-04d1-450c-9298-78a96a2cafe2">
      <input type="hidden" name="subject" value="Data Registrasi Baru">
      <input type="checkbox" name="botcheck" style="display: none;">
      <input type="hidden" name="from_name" value="Form Registrasi">
      <h1>Form Registrasi</h1>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <label>Nama Anda</label>
      <input type="text" name="name" placeholder="Masukkan nama lengkap" required>
      <label>Email Anda</label>
      <input type="email" name="email" placeholder="Masukkan Email" required>
      <label>Tanggal Lahir</label>
      <input type="Date" name="Tanggal_Lahir" required>
      <label>Password</label>
      <input type="password" name="Password" placeholder="Masukkan password" required>
      <label>Konfirmasi Password</label>
      <input type="password" name="Konfirmasi_Password" placeholder="Masukkan kembali password" required>
      <label>
        <input type="checkbox" id="showPass"> Tampilkan Password
      </label>
      <div id="strengthText"></div>
      <label>Status Pekerjaan</label>
      <div class="radio-group">
        <input type="radio" id="workYes" name="Status_Pekerjaan" value="Bekerja" required> Bekerja
        <input type="radio" id="workNo" name="Status_Pekerjaan" value="Tidak Bekerja"> Tidak Bekerja
      </div>
      <div id="workDetails" style="display:none;">
        <label>Jenis Pekerjaan</label>
        <select name="Jenis_Pekerjaan" id="jobType">
          <option value="">Pilih pekerjaan</option>
          <option>Programmer</option>
          <option>Desainer</option>
          <option>Guru/Dosen</option>
          <option>Dokter</option>
          <option>Wiraswasta</option>
          <option>Pelayan</option>
          <option>Lainnya</option>
        </select>
        <label id="jobOtherLabel" style="display:none;">Pekerjaan Lainnya</label>
        <textarea name="Pekerjaan Lainnya" id="jobOther" style="display:none;"
          placeholder="Tuliskan pekerjaan jika tidak ada di daftar"></textarea>
      </div>
      <label>Pendidikan Terakhir</label>
      <select name="Pendidikan Terakhir" required>
        <option value="">Pilih pendidikan</option>
        <option>Kuliah</option>
        <option>SMK/SMA</option>
        <option>SMP</option>
        <option>SD</option>
      </select>
      <label>Hobi</label>
      <input type="text" name="Hobi" placeholder="Masukkan hobi" required>
      <label>Negara</label>
      <select name="Negara" id="countrySelect" required>
        <option value="">Pilih Negara</option>
        <option>Indonesia</option>
        <option>Malaysia</option>
        <option>Singapura</option>
        <option>Thailand</option>
        <option>Filipina</option>
        <option>Vietnam</option>
        <option value="Lainnya">Lainnya</option>
      </select>
      <label id="otherCountryLabel" style="display:none;">Negara Lainnya</label>
      <textarea name="Negara Lainnya" id="otherCountry" placeholder="Tuliskan negara jika tidak ada di daftar"
        style="display:none;" rows="2"></textarea>
      <label>Provinsi</label>
      <input type="text" name="Provinsi" placeholder="Masukkan provinsi" required>
      <label>Kecamatan</label>
      <input type="text" name="Kecamatan" placeholder="Masukkan kecamatan" required>
      <label>Kota</label>
      <input type="text" name="Kota" placeholder="Masukkan kota" required>
      <label>Kode Pos</label>
      <input type="text" name="Kode Pos" placeholder="Masukkan kode pos" pattern="[0-9]{5}" required>
      <label>Alamat Jalan</label>
      <textarea name="Alamat Jalan" placeholder="Masukkan alamat jalan" required></textarea>
      <label>Jenis Kelamin</label>
      <div class="radio-group">
        <input type="radio" name="Jenis Kelamin" value="Pria" required> Pria
        <input type="radio" name="Jenis Kelamin" value="Wanita"> Wanita
      </div>
      <label>Agama</label>
      <select name="Agama" required>
        <option value="">Pilih Agama</option>
        <option>Islam</option>
        <option>Kristen</option>
        <option>Katolik</option>
        <option>Hindu</option>
        <option>Buddha</option>
        <option>Konghucu</option>
      </select>
      <label>Informasi Tambahan</label>
      <textarea name="Informasi Tambahan" placeholder="Masukkan informasi tambahan"></textarea>
      <label for="imageSelect">Pilih Gambar</label>
      <select id="imageSelect">
        <option
          value="https://tse4.mm.bing.net/th/id/OIP.Gsf7YDHoAX_zIXXMSGpgnAHaH7?r=0&cb=thfvnextfalcon&rs=1&pid=ImgDetMain&o=7&rm=3">
          --Pilih Gambar--</option>
        <option
          value="https://th.bing.com/th/id/OIP.H88aKb7tUCF3XycKwqHjFgHaEK?r=0&o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3">
          Shrek</option>
        <option
          value="https://th.bing.com/th/id/OIP.oe7ZqPy0gBdS5pEobFprdgHaEK?r=0&o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3">Po
        </option>
        <option value="https://i.pinimg.com/originals/8e/c3/6a/8ec36a4722c6a4228dc778f6fe4545d5.jpg">Toothless</option>
        <option
          value="https://th.bing.com/th/id/OIP.4sJ8ZIGLAyQ2iES1D-bXPwHaHa?r=0&o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3">
          Miles Morales</option>
        <option value="https://media.tenor.com/zRgomxzbo5YAAAAM/funny.gif">Eagle</option>
        <option value="https://i.pinimg.com/originals/e3/28/8f/e3288f72ccd9bc0ddac441a2f12f59db.jpg">Cat</option>
      </select>
      <img id="displayImage"
        src="https://tse4.mm.bing.net/th/id/OIP.Gsf7YDHoAX_zIXXMSGpgnAHaH7?r=0&cb=thfvnextfalcon&rs=1&pid=ImgDetMain&o=7&rm=3"
        alt="Preview Gambar">
      <div class="btn-group">
        <button type="submit" class="submit">Submit</button>
        <button type="reset" class="reset">Reset</button>
      </div>
    </form>
  </div>
  <script>
    const form = document.querySelector('form');
    const password = document.querySelector('input[name="Password"]');
    const confirmPassword = document.querySelector('input[name="Konfirmasi_Password"]');
    const showPass = document.getElementById('showPass');
    const imageSelect = document.getElementById('imageSelect');
    const displayImage = document.getElementById('displayImage');
    const workYes = document.getElementById('workYes');
    const workNo = document.getElementById('workNo');
    const workDetails = document.getElementById('workDetails');
    const jobType = document.getElementById('jobType');
    const jobOther = document.getElementById('jobOther');
    const jobOtherLabel = document.getElementById('jobOtherLabel');
    const countrySelect = document.getElementById('countrySelect');
    const otherCountry = document.getElementById('otherCountry');
    const otherCountryLabel = document.getElementById('otherCountryLabel');
    showPass.addEventListener('change', function () {
      const type = this.checked ? 'text' : 'password';
      password.type = type;
      confirmPassword.type = type;
    });
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      const month = months[now.getMonth()];
      const year = now.getFullYear();
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
      document.getElementById('date').textContent = `${day} ${month} ${year}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
    function updateWorkFields() {
      if (workYes.checked) {
        workDetails.style.display = 'block';
        jobType.required = true;
      } else {
        workDetails.style.display = 'none';
        jobType.required = false;
        jobType.value = '';
        jobOther.value = '';
        jobOther.style.display = 'none';
        jobOtherLabel.style.display = 'none';
        jobOther.required = false;
      }
    }
    function updateCountryField() {
      if (countrySelect.value === 'Lainnya') {
        otherCountry.style.display = 'block';
        otherCountryLabel.style.display = 'block';
        otherCountry.required = true;
      } else {
        otherCountry.style.display = 'none';
        otherCountryLabel.style.display = 'none';
        otherCountry.required = false;
        otherCountry.value = '';
      }
    }
    workYes.addEventListener('change', updateWorkFields);
    workNo.addEventListener('change', updateWorkFields);
    countrySelect.addEventListener('change', updateCountryField);
    jobType.addEventListener('change', function () {
      if (this.value === 'Lainnya') {
        jobOther.style.display = 'block';
        jobOtherLabel.style.display = 'block';
        jobOther.required = true;
      } else {
        jobOther.style.display = 'none';
        jobOtherLabel.style.display = 'none';
        jobOther.required = false;
        jobOther.value = '';
      }
    });
    imageSelect.addEventListener('change', function () {
      if (this.value) {
        displayImage.src = this.value;
      }
    });
    const passwordInput = document.querySelector('input[name="Password"]');
    const strengthText = document.getElementById('strengthText');
    passwordInput.addEventListener('input', function () {
      const value = passwordInput.value;
      let score = 0;
      if (value.length >= 8) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/[a-z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;
      if (score <= 2) {
        strengthText.textContent = 'Password Lemah';
        strengthText.style.color = 'red';
      }
      else if (score <= 4) {
        strengthText.textContent = 'Password Sedang';
        strengthText.style.color = 'orange';
      }
      else {
        strengthText.textContent = 'Password Kuat';
        strengthText.style.color = 'lime';
      }
    });
    const progressBar = document.getElementById('progressBar');
    const allInputs = document.querySelectorAll(
      'input:not([type="hidden"]):not([type="radio"]):not([type="checkbox"]), select, textarea');
    function updateProgress() {
      let filled = 0;
      allInputs.forEach(input => {
        if (
          input.offsetParent !== null &&
          input.value.trim() !== '') {
          filled++;
        }
      });
      const visibleInputs = [...allInputs].filter(input =>
        input.offsetParent !== null);
      const percent = (filled / visibleInputs.length) * 100;
      progressBar.style.width = percent + '%';
    }
    allInputs.forEach(input => {
      input.addEventListener('input', updateProgress);
      input.addEventListener('change', updateProgress);
    });
    updateProgress();

    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (password.value !== confirmPassword.value) {
        alert('Password dan konfirmasi password tidak sama!');
        return;
      }

      if (!confirm('Apakah data sudah benar?')) {
        return;
      }

      const formData = new FormData(form);

      const originalText = submitBtn.textContent;

      submitBtn.textContent = "Sending...";
      submitBtn.disabled = true;

      try {

        const response = await fetch("https://api.web3forms.com/submit", {
  method: "POST",
  body: formData
});
        const data = await response.json();

        if (response.ok) {

          alert("Data berhasil dikirim!");

          form.reset();

          strengthText.textContent = '';
          progressBar.style.width = '0%';

          workDetails.style.display = 'none';
          jobOther.style.display = 'none';
          jobOtherLabel.style.display = 'none';

          otherCountry.style.display = 'none';
          otherCountryLabel.style.display = 'none';

          displayImage.src = imageSelect.options[0].value;

          window.location.href = "https://youtu.be/d1NjkYjRn34?si=-g1rQkul_WIOtmer";

        } else {

          alert("Error: " + data.message);

        }

      } catch (error) {

        alert("Terjadi kesalahan!");

      } finally {

        submitBtn.textContent = "Submit";
        submitBtn.disabled = false;

      }
    });
  </script>
</body>

</html>
